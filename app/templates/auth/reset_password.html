{% extends 'base.html' %}
{% block title %}Réinitialiser le mot de passe — MultiProno{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="mb-6 text-center font-display text-4xl tracking-wide">Nouveau mot de passe</h1>
  <div class="rounded-2xl border border-border bg-surface/80 backdrop-blur p-5 sm:p-6">
    <form method="post" class="space-y-4">
      <div class="space-y-1.5">
        <label for="password" class="text-xs font-semibold uppercase tracking-wide text-muted">Nouveau mot de passe</label>
        <input id="password" name="password" type="password" required
               class="w-full rounded-xl border border-border bg-ink-2 px-3.5 py-2.5 text-paper outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/25">
      </div>
      <div class="space-y-1.5">
        <label for="password_confirm" class="text-xs font-semibold uppercase tracking-wide text-muted">Confirmation</label>
        <input id="password_confirm" name="password_confirm" type="password" required
               class="w-full rounded-xl border border-border bg-ink-2 px-3.5 py-2.5 text-paper outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/25">
      </div>
      <button type="submit" class="w-full inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-semibold transition bg-brand text-white shadow-glow-brand hover:bg-brand-2">
        Réinitialiser le mot de passe
      </button>
    </form>
  </div>
</div>
{% endblock %}
