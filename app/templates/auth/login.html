{% extends 'base.html' %}
{% block title %}Connexion — MultiProno{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="mb-6 text-center font-display text-4xl tracking-wide">Connexion</h1>
  <div class="rounded-2xl border border-border bg-surface/80 backdrop-blur p-5 sm:p-6">
    <form method="post" class="space-y-4">
      <input type="hidden" name="next" value="{{ next or '' }}">
      <div class="space-y-1.5">
        <label for="email" class="text-xs font-semibold uppercase tracking-wide text-muted">E-mail</label>
        <input id="email" name="email" type="email" required value="{{ email or '' }}"
               class="w-full rounded-xl border border-border bg-ink-2 px-3.5 py-2.5 text-paper placeholder:text-muted-2 outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/25">
      </div>
      <div class="space-y-1.5">
        <label for="password" class="text-xs font-semibold uppercase tracking-wide text-muted">Mot de passe</label>
        <input id="password" name="password" type="password" required
               class="w-full rounded-xl border border-border bg-ink-2 px-3.5 py-2.5 text-paper outline-none transition focus:border-brand focus:ring-2 focus:ring-brand/25">
      </div>
      <button type="submit" class="w-full inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-semibold transition bg-brand text-white shadow-glow-brand hover:bg-brand-2">
        Se connecter
      </button>
    </form>
  </div>
  <p class="mt-4 text-center text-sm text-muted">
    Pas encore de compte ?
    <a href="{{ url_for('auth.register') }}" class="font-semibold text-cyan hover:underline">Créer un compte</a>
  </p>
</div>
{% endblock %}
