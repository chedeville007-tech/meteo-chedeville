{% macro sport_icon(name, class='') %}
{% if name == 'FOOTBALL' %}
<svg viewBox="0 0 24 24" fill="none" class="{{ class }}" aria-hidden="true">
  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" />
  <path d="M12 7.2 15.6 9.8l-1.4 4.3H9.8l-1.4-4.3L12 7.2Z" fill="currentColor" />
  <path d="M12 3v4.2M12 20.8V16.6M4.6 8l3.8 1.8M19.4 8l-3.8 1.8M4.6 16l3.8-1.9M19.4 16l-3.8-1.9"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
</svg>
{% elif name == 'RUGBY' %}
<svg viewBox="0 0 24 24" fill="none" class="{{ class }}" aria-hidden="true">
  <path d="M4.5 8.2C7.7 5 12 3.4 16.4 4.6c2 .5 3 1.5 3.5 3.5 1.2 4.4-.4 8.7-3.6 11.9-3.2 3.2-7.5 4.8-11.9 3.6-2-.5-3-1.5-3.5-3.5C-.3 15.7 1.3 11.4 4.5 8.2Z"
        stroke="currentColor" stroke-width="1.6" transform="rotate(-8 12 12)" />
  <path d="M8 10.5h8M9.3 12.5h5.4M10.6 14.5h2.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" transform="rotate(-8 12 12)" />
</svg>
{% elif name == 'TENNIS' %}
<svg viewBox="0 0 24 24" fill="none" class="{{ class }}" aria-hidden="true">
  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" />
  <path d="M4 7.5c2.6 1.6 4 4 4 4.5s-1.4 2.9-4 4.5M20 7.5c-2.6 1.6-4 4-4 4.5s1.4 2.9 4 4.5"
        stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
</svg>
{% elif name == 'PING_PONG' %}
<svg viewBox="0 0 24 24" fill="none" class="{{ class }}" aria-hidden="true">
  <circle cx="16.5" cy="7.5" r="2.6" stroke="currentColor" stroke-width="1.5" />
  <path d="M12.2 9.8 4.3 17.7a2 2 0 0 0 0 2.8l0 0a2 2 0 0 0 2.8 0l7.9-7.9"
        stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
  <path d="M9.6 12.9c1.8 1.8 3.1 2.4 4.9 1.6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
</svg>
{% elif name == 'BASKETBALL' %}
<svg viewBox="0 0 24 24" fill="none" class="{{ class }}" aria-hidden="true">
  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" />
  <path d="M12 3v18M3 12h18M5.6 5.6c2.6 2.4 4.1 5 4.1 6.4s-1.5 4-4.1 6.4M18.4 5.6c-2.6 2.4-4.1 5-4.1 6.4s1.5 4 4.1 6.4"
        stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
</svg>
{% else %}
<svg viewBox="0 0 24 24" fill="none" class="{{ class }}" aria-hidden="true">
  <path d="M7 4h10v4a5 5 0 0 1-10 0V4Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
  <path d="M7 5H4v1a4 4 0 0 0 4 4M17 5h3v1a4 4 0 0 1-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
  <path d="M12 13v3M9 20h6M9.5 20c0-2 .8-2.6 2.5-2.6s2.5.6 2.5 2.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
{% endif %}
{% endmacro %}
