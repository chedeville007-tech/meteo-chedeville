<!doctype html>
<html lang="fr" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MultiProno{% endblock %}</title>
  <meta name="description" content="Le pool de pronostics sportifs multi-sports entre amis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script defer src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body class="min-h-full flex flex-col antialiased">
  <header class="sticky top-0 z-20 border-b border-border/60 bg-ink/85 backdrop-blur">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3 sm:px-6">
      <a href="{{ url_for('home.index') }}" class="flex items-center gap-2 transition hover:opacity-80">
        <span class="font-display text-3xl tracking-wide">Multi<span class="text-brand">Prono</span></span>
      </a>
      <div class="flex items-center gap-2">
        <a href="{{ url_for('home.index') }}"
           class="inline-flex items-center gap-1.5 rounded-lg border border-border px-3 py-1.5 text-sm font-semibold text-muted transition hover:border-brand/50 hover:text-brand">
          <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
            <path d="M4 11.5 12 4l8 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Accueil
        </a>
        {% set user = current_user() %}
        {% if user %}
        <a href="{{ url_for('profile.index') }}"
           class="inline-flex items-center gap-2 rounded-lg border border-border px-2.5 py-1 text-sm font-semibold text-muted transition hover:border-brand/50 hover:text-brand">
          {% if user['has_avatar'] %}
          <img src="{{ url_for('avatar.avatar', user_id=user['id']) }}" alt="" class="h-5 w-5 rounded-full object-cover">
          {% endif %}
          <span class="hidden sm:inline">{{ user['pseudo'] }}</span>
        </a>
        <form method="post" action="{{ url_for('auth.logout') }}">
          <button type="submit" class="rounded-lg border border-border px-3 py-1.5 text-sm font-semibold text-muted transition hover:border-brand/50 hover:text-brand">
            Déconnexion
          </button>
        </form>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="rounded-lg border border-border px-3 py-1.5 text-sm font-semibold text-muted transition hover:border-brand/50 hover:text-brand">
          Connexion
        </a>
        {% endif %}
      </div>
    </div>
  </header>
  <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-8 sm:px-6 sm:py-10">
    {% from 'partials/macros.html' import flashed_messages %}
    {{ flashed_messages() }}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
