<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Météo personnalisée</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<header class="hero">
  <h1>🌦️ Météo personnalisée</h1>
  <p class="subtitle">Prévisions sur 7 jours, adaptées à ton activité — clique sur un jour pour le détail heure par heure.</p>

  <form id="search-form" class="search-bar">
    <input type="text" id="city" name="city" placeholder="Nom de la ville (ex : Lyon)" required autocomplete="off">
    <select id="activity" name="activity">
      {% for key, label in activities.items() %}
      <option value="{{ key }}">{{ label }}</option>
      {% endfor %}
    </select>
    <button type="submit">
      <span class="btn-text">Rechercher</span>
      <span class="spinner" hidden></span>
    </button>
  </form>
</header>

<main class="app">
  <div id="status"></div>
  <div id="location-title"></div>
  <div id="forecast" class="forecast-grid"></div>
</main>

<div id="hourly-modal" class="modal-overlay" hidden>
  <div class="modal">
    <button id="modal-close" class="modal-close" aria-label="Fermer">✕</button>
    <div id="modal-header"></div>
    <div id="modal-body" class="hourly-scroller"></div>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
